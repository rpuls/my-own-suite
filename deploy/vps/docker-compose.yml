# ===========================================
# My-Own-Suite Docker Compose
# ===========================================
# Architecture:
# - Root .env: DOMAIN variable (shared across all services)
# - apps/<app>/.env: App-specific settings (tokens, flags)
# ===========================================

services:
  # -------------------------------------------
  # Caddy - Reverse Proxy (entry point)
  # -------------------------------------------
  caddy:
    image: caddy:latest
    container_name: mos-caddy
    restart: unless-stopped
    env_file:
      - .env
      - ./apps/radicale/.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mos-network
    depends_on:
      - homepage

  # -------------------------------------------
  # Homepage - Main Dashboard
  # -------------------------------------------
  homepage:
    build:
      context: ../../apps/homepage
      dockerfile: Dockerfile
    container_name: mos-homepage
    restart: unless-stopped
    env_file:
      - .env
      - ./apps/homepage/.env
    volumes:
      - homepage_images:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mos-network

  # -------------------------------------------
  # Vaultwarden - Password Manager
  # -------------------------------------------
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: mos-vaultwarden
    restart: unless-stopped
    profiles:
      - vaultwarden
    env_file:
      - .env
      - ./apps/vaultwarden/.env
    environment:
      - DOMAIN=http://vaultwarden.${DOMAIN}
    volumes:
      - vaultwarden_data:/data
    networks:
      - mos-network

  # -------------------------------------------
  # Seafile - File Sync and Share
  # -------------------------------------------
  seafile-mysql:
    image: mysql:8.0
    container_name: mos-seafile-mysql
    restart: unless-stopped
    profiles:
      - seafile
    command:
      - --default-authentication-plugin=mysql_native_password
    env_file:
      - ./apps/seafile/.env
    environment:
      - MYSQL_LOG_CONSOLE=true
    volumes:
      - seafile_mysql_data:/var/lib/mysql
    networks:
      - mos-network

  seafile-memcached:
    image: memcached:1.6
    container_name: mos-seafile-memcached
    restart: unless-stopped
    profiles:
      - seafile
    networks:
      mos-network:
        aliases:
          - memcached

  seafile:
    build:
      context: ../../apps/seafile
      dockerfile: Dockerfile
    container_name: mos-seafile
    restart: unless-stopped
    profiles:
      - seafile
    env_file:
      - .env
      - ./apps/seafile/.env
    environment:
      - SEAFILE_SERVER_HOSTNAME=seafile.${DOMAIN}
      - MEMCACHED_SERVER=${MEMCACHED_SERVER:-memcached:11211}
      - ONLYOFFICE_INTERNAL_SEAFILE_URL=${ONLYOFFICE_INTERNAL_SEAFILE_URL:-http://seafile}
    volumes:
      - seafile_data:/shared
    networks:
      - mos-network
    depends_on:
      - seafile-mysql
      - seafile-memcached

  # -------------------------------------------
  # OnlyOffice - Document Editing Suite
  # -------------------------------------------
  onlyoffice:
    build:
      context: ../../apps/onlyoffice
      dockerfile: Dockerfile
    container_name: mos-onlyoffice
    restart: unless-stopped
    profiles:
      - onlyoffice
    env_file:
      - .env
      - ./apps/onlyoffice/.env
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
    networks:
      - mos-network

  # -------------------------------------------
  # Stirling PDF - PDF Tools Suite
  # -------------------------------------------
  stirling-pdf:
    build:
      context: ../../apps/stirling-pdf
      dockerfile: Dockerfile
    container_name: mos-stirling-pdf
    restart: unless-stopped
    profiles:
      - stirling-pdf
    env_file:
      - .env
      - ./apps/stirling-pdf/.env
    volumes:
      - stirling_pdf_training_data:/usr/share/tessdata
      - stirling_pdf_extra_configs:/configs
      - stirling_pdf_custom_files:/customFiles/
      - stirling_pdf_logs:/logs/
      - stirling_pdf_pipeline:/pipeline/
    networks:
      - mos-network

  # -------------------------------------------
  # Radicale - CalDAV/CardDAV Server
  # -------------------------------------------
  radicale:
    build:
      context: ../../apps/radicale
      dockerfile: Dockerfile
    container_name: mos-radicale
    restart: unless-stopped
    profiles:
      - radicale
    env_file:
      - .env
      - ./apps/radicale/.env
    volumes:
      - radicale_data:/data
    networks:
      - mos-network

  # -------------------------------------------
  # Immich - Photos and Videos
  # -------------------------------------------
  immich:
    build:
      context: ../../apps/immich/server
      dockerfile: Dockerfile
    container_name: mos-immich
    restart: unless-stopped
    profiles:
      - immich
    env_file:
      - .env
      - ./apps/immich/.env
    volumes:
      - immich_upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    networks:
      - mos-network
    depends_on:
      - immich-redis
      - immich-postgres
      - immich-machine-learning
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:2283/api/server/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  immich-machine-learning:
    build:
      context: ../../apps/immich/machine-learning
      dockerfile: Dockerfile
    container_name: mos-immich-machine-learning
    restart: unless-stopped
    profiles:
      - immich
    env_file:
      - ./apps/immich/.env
    volumes:
      - immich_model_cache:/cache
      - /etc/localtime:/etc/localtime:ro
    networks:
      - mos-network

  immich-redis:
    image: redis:6.2-alpine
    container_name: mos-immich-redis
    restart: unless-stopped
    profiles:
      - immich
    networks:
      - mos-network
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 5

  immich-postgres:
    build:
      context: ../../apps/immich/postgres
      dockerfile: Dockerfile
    container_name: mos-immich-postgres
    restart: unless-stopped
    profiles:
      - immich
    env_file:
      - ./apps/immich/.env
    environment:
      - POSTGRES_INITDB_ARGS=--data-checksums
    command: >-
      postgres -c shared_preload_libraries=vchord.so,vectors.so
      -c 'search_path="$$user", public, vectors'
      -c logging_collector=on
      -c max_wal_size=2GB
      -c shared_buffers=512MB
      -c wal_compression=on
    volumes:
      - immich_db:/var/lib/postgresql/data
    networks:
      - mos-network
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname=$${POSTGRES_DB} --username=$${POSTGRES_USER} || exit 1
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  homepage_images:
  vaultwarden_data:
  seafile_data:
  seafile_mysql_data:
  onlyoffice_data:
  stirling_pdf_training_data:
  stirling_pdf_extra_configs:
  stirling_pdf_custom_files:
  stirling_pdf_logs:
  stirling_pdf_pipeline:
  radicale_data:
  immich_upload:
  immich_model_cache:
  immich_db:

networks:
  mos-network:
    driver: bridge
