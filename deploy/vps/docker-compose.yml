# ===========================================
# My-Own-Suite Docker Compose
# ===========================================
# Architecture:
# - Root .env: DOMAIN variable (shared across all services)
# - services/<app>/.env: App-specific settings (tokens, flags)
# ===========================================

services:
  # -------------------------------------------
  # Caddy - Reverse Proxy (entry point)
  # -------------------------------------------
  caddy:
    image: caddy:latest
    container_name: mos-caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mos-network
    depends_on:
      - homepage

  # -------------------------------------------
  # Homepage - Main Dashboard
  # -------------------------------------------
  homepage:
    build:
      context: ../../apps/homepage
      dockerfile: Dockerfile
    container_name: mos-homepage
    restart: unless-stopped
    env_file:
      - .env
      - ./services/homepage/.env
    volumes:
      - homepage_images:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mos-network

  # -------------------------------------------
  # Vaultwarden - Password Manager
  # -------------------------------------------
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: mos-vaultwarden
    restart: unless-stopped
    profiles:
      - vaultwarden
    env_file:
      - .env
      - ./services/vaultwarden/.env
    environment:
      - DOMAIN=http://vaultwarden.${DOMAIN}
    volumes:
      - vaultwarden_data:/data
    networks:
      - mos-network

  # -------------------------------------------
  # Seafile - File Sync and Share
  # -------------------------------------------
  seafile-mysql:
    image: mysql:8.0
    container_name: mos-seafile-mysql
    restart: unless-stopped
    profiles:
      - seafile
    env_file:
      - ./services/seafile/.env
    environment:
      - MYSQL_LOG_CONSOLE=true
    volumes:
      - seafile_mysql_data:/var/lib/mysql
    networks:
      - mos-network

  seafile-memcached:
    image: memcached:1.6
    container_name: mos-seafile-memcached
    restart: unless-stopped
    profiles:
      - seafile
    networks:
      mos-network:
        aliases:
          - memcached

  seafile:
    build:
      context: ../../apps/seafile
      dockerfile: Dockerfile
    container_name: mos-seafile
    restart: unless-stopped
    profiles:
      - seafile
    env_file:
      - .env
      - ./services/seafile/.env
    environment:
      - SEAFILE_SERVER_HOSTNAME=seafile.${DOMAIN}
    volumes:
      - seafile_data:/shared
    networks:
      - mos-network
    depends_on:
      - seafile-mysql
      - seafile-memcached

volumes:
  caddy_data:
  caddy_config:
  homepage_images:
  vaultwarden_data:
  seafile_data:
  seafile_mysql_data:

networks:
  mos-network:
    driver: bridge