# ===========================================
# My-Own-Suite Docker Compose
# ===========================================
# Architecture:
# - Root .env: DOMAIN variable (shared across all services)
# - services/<app>/.env: App-specific settings (tokens, flags)
# ===========================================

services:
  # -------------------------------------------
  # Caddy - Reverse Proxy (entry point)
  # -------------------------------------------
  caddy:
    image: caddy:latest
    container_name: mos-caddy
    restart: unless-stopped
    env_file:
      - .env
      - ./services/radicale/.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mos-network
    depends_on:
      - homepage

  # -------------------------------------------
  # Homepage - Main Dashboard
  # -------------------------------------------
  homepage:
    build:
      context: ../../apps/homepage
      dockerfile: Dockerfile
    container_name: mos-homepage
    restart: unless-stopped
    env_file:
      - .env
      - ./services/homepage/.env
    volumes:
      - homepage_images:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mos-network

  # -------------------------------------------
  # Vaultwarden - Password Manager
  # -------------------------------------------
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: mos-vaultwarden
    restart: unless-stopped
    profiles:
      - vaultwarden
    env_file:
      - .env
      - ./services/vaultwarden/.env
    environment:
      - DOMAIN=http://vaultwarden.${DOMAIN}
    volumes:
      - vaultwarden_data:/data
    networks:
      - mos-network

  # -------------------------------------------
  # Seafile - File Sync and Share
  # -------------------------------------------
  seafile-mysql:
    image: mysql:8.0
    container_name: mos-seafile-mysql
    restart: unless-stopped
    profiles:
      - seafile
    command:
      - --default-authentication-plugin=mysql_native_password
    env_file:
      - ./services/seafile/.env
    environment:
      - MYSQL_LOG_CONSOLE=true
    volumes:
      - seafile_mysql_data:/var/lib/mysql
    networks:
      - mos-network

  seafile-memcached:
    image: memcached:1.6
    container_name: mos-seafile-memcached
    restart: unless-stopped
    profiles:
      - seafile
    networks:
      mos-network:
        aliases:
          - memcached

  seafile:
    build:
      context: ../../apps/seafile
      dockerfile: Dockerfile
    container_name: mos-seafile
    restart: unless-stopped
    profiles:
      - seafile
    env_file:
      - .env
      - ./services/seafile/.env
    environment:
      - SEAFILE_SERVER_HOSTNAME=seafile.${DOMAIN}
      - MEMCACHED_SERVER=${MEMCACHED_SERVER:-memcached:11211}
      - ONLYOFFICE_INTERNAL_SEAFILE_URL=${ONLYOFFICE_INTERNAL_SEAFILE_URL:-http://seafile}
    volumes:
      - seafile_data:/shared
    networks:
      - mos-network
    depends_on:
      - seafile-mysql
      - seafile-memcached

  # -------------------------------------------
  # OnlyOffice - Document Editing Suite
  # -------------------------------------------
  onlyoffice:
    build:
      context: ../../apps/onlyoffice
      dockerfile: Dockerfile
    container_name: mos-onlyoffice
    restart: unless-stopped
    profiles:
      - onlyoffice
    env_file:
      - .env
      - ./services/onlyoffice/.env
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
    networks:
      - mos-network

  # -------------------------------------------
  # Stirling PDF - PDF Tools Suite
  # -------------------------------------------
  stirling-pdf:
    build:
      context: ../../apps/stirling-pdf
      dockerfile: Dockerfile
    container_name: mos-stirling-pdf
    restart: unless-stopped
    profiles:
      - stirling-pdf
    env_file:
      - .env
      - ./services/stirling-pdf/.env
    volumes:
      - stirling_pdf_training_data:/usr/share/tessdata
      - stirling_pdf_extra_configs:/configs
      - stirling_pdf_custom_files:/customFiles/
      - stirling_pdf_logs:/logs/
      - stirling_pdf_pipeline:/pipeline/
    networks:
      - mos-network

  # -------------------------------------------
  # Radicale - CalDAV/CardDAV Server
  # -------------------------------------------
  radicale:
    build:
      context: ../../apps/radicale
      dockerfile: Dockerfile
    container_name: mos-radicale
    restart: unless-stopped
    profiles:
      - radicale
    env_file:
      - .env
      - ./services/radicale/.env
    volumes:
      - radicale_data:/data
    networks:
      - mos-network

volumes:
  caddy_data:
  caddy_config:
  homepage_images:
  vaultwarden_data:
  seafile_data:
  seafile_mysql_data:
  onlyoffice_data:
  stirling_pdf_training_data:
  stirling_pdf_extra_configs:
  stirling_pdf_custom_files:
  stirling_pdf_logs:
  stirling_pdf_pipeline:
  radicale_data:

networks:
  mos-network:
    driver: bridge
