# ===========================================
# My-Own-Suite Docker Compose
# ===========================================
# Architecture:
# - Root .env: DOMAIN variable (shared across all services)
# - services/<app>/.env: App-specific settings (tokens, flags)
# ===========================================

services:
  # -------------------------------------------
  # Caddy - Reverse Proxy (entry point)
  # -------------------------------------------
  caddy:
    image: caddy:latest
    container_name: mos-caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mos-network
    depends_on:
      - homepage

  # -------------------------------------------
  # Homepage - Main Dashboard
  # -------------------------------------------
  homepage:
    build:
      context: ../../apps/homepage
      dockerfile: Dockerfile
    container_name: mos-homepage
    restart: unless-stopped
    env_file:
      - .env
      - ./services/homepage/.env
    volumes:
      - homepage_images:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mos-network

  # -------------------------------------------
  # Vaultwarden - Password Manager
  # -------------------------------------------
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: mos-vaultwarden
    restart: unless-stopped
    profiles:
      - vaultwarden
    env_file:
      - .env
      - ./services/vaultwarden/.env
    environment:
      - DOMAIN=http://vaultwarden.${DOMAIN}
    volumes:
      - vaultwarden_data:/data
    networks:
      - mos-network

volumes:
  caddy_data:
  caddy_config:
  homepage_images:
  vaultwarden_data:

networks:
  mos-network:
    driver: bridge