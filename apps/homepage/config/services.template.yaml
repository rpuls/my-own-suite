# Homepage Services Template
#
# This template defines your dashboard structure.
# The replacer will inject values from environment variables.
#
# Placeholders: ${ENV_VAR_NAME}
# - If all placeholders in a service are resolved, it appears on the dashboard
# - If any placeholder cannot be resolved, the entire service is removed
# - Empty categories are automatically removed
#
# Customize freely: move categories, add services, change descriptions, etc.
- My Own Suite:
    - My Files:
        - Seafile:
            href: ${SEAFILE_URL}
            description: Your private cloud drive with built-in editors for documents, spreadsheets, and presentations
            icon: /images/seafile.png
        - Immich:
            href: ${IMMICH_URL}
            description: A beautiful private photo app with smart search, sharing, and automatic backup
            icon: /images/immich.png

    - My Tools:
        - Stirling PDF:
            href: ${STIRLING_PDF_URL}
            description: Handle everyday PDF jobs without uploading personal documents elsewhere
            icon: /images/stirling-pdf.png

    - My Security:
        - Vaultwarden:
            href: ${VAULTWARDEN_URL}
            description: Keep your passwords and autofill in a vault you control
            icon: /images/vaultwarden.png

    - Management:
        - Suite Manager:
            href: ${SUITE_MANAGER_URL}/setup/
            description: Set up the suite, manage access, and return to onboarding when needed
            icon: /images/my-own-suite-mark.png


- My Shortcuts:
    - Calendar:
        - Radicale:
            href: ${RADICALE_URL}
            description: Keep your calendar in sync across devices without giving it to Big Tech
            icon: /images/radicale.png
            widget:
              type: calendar
              view: monthly
              maxEvents: 8
              showTime: true
              integrations:
                - type: ical
                  name: My Calendar
                  url: ${RADICALE_ICAL_URL}
                  color: cyan

    - My Bookmarks:
        - Example Bookmark:
            href: https://example.com
            description: Replace with your own quick link

    - Open Source Resources:
        - My Own Suite Docs:
            href: https://myownsuite.org/docs/
            description: Guides and walkthroughs for getting the suite running and using it
        - Funkyton:
            href: https://www.funkyton.com
            description: Open source resources and tools
            icon: /images/funkyton-F-icon.png
