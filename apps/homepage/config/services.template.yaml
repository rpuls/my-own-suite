# Homepage Services Template
#
# This template defines your dashboard structure.
# The replacer will inject values from environment variables.
#
# Placeholders: ${ENV_VAR_NAME}
# - If all placeholders in a service are resolved, it appears on the dashboard
# - If any placeholder cannot be resolved, the entire service is removed
# - Empty categories are automatically removed
#
# Customize freely: move categories, add services, change descriptions, etc.

- Security:
    - Vaultwarden:
        href: ${VAULTWARDEN_URL}
        description: Self-hosted password manager
        icon: vaultwarden.png

- Storage:
    - Seafile:
        href: ${SEAFILE_URL}
        description: Self-hosted file sync and share
        icon: mdi-folder-sync

- Productivity:
    - OnlyOffice:
        href: ${ONLYOFFICE_URL}
        description: Self-hosted document editing suite
        icon: mdi-file-document-edit-outline

- Open Source Resources:
    - Funkyton:
        href: https://www.funkyton.com
        description: Open source resources and tools
        icon: https://res.cloudinary.com/hczpmiapo/image/upload/v1771353952/Static%20assets/Logos/funkyton-F-icon_gtpfml.png
    - Test Message:
        href: https://example.com
        description: ${TEST_MESSAGE}
        icon: mdi-tag-text-outline

