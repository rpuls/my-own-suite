---
# Homepage information widgets
# Theme and color are intentionally left user-selectable in settings.yaml.

- datetime:
    text_size: md
    format:
      weekday: short
      day: numeric
      month: short
      hour: numeric
      minute: 2-digit

- search:
    provider: custom
    url: https://www.startpage.com/sp/search?query=
    suggestionUrl: https://www.startpage.com/osuggestions?q=
    showSearchSuggestions: true
    target: _blank
