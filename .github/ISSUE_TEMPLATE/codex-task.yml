name: Codex task
description: A focused task that Codex can pick up from GitHub.
title: "[Codex]: "
labels:
  - codex-ready
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be true when this task is complete?
      placeholder: Describe the intended outcome.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this matter, and what recent work does it relate to?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files likely involved
      description: List likely files or areas. It is okay if this is approximate.
      placeholder: |
        - apps/suite-manager/...
        - scripts/selfhost/...
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use concrete, testable bullets.
      placeholder: |
        - The UI shows ...
        - The command ...
        - Existing installs ...
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note compatibility, deployment, security, UX, or data-safety constraints.
    validations:
      required: false
  - type: textarea
    id: testing
    attributes:
      label: Testing
      description: Describe the smallest useful verification, including any hardware or Docker requirements.
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: Related issues, PRs, and decisions
      description: Link anything relevant. Mention if docs/decisions.md should be updated.
    validations:
      required: false
